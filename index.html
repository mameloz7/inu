<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>わんバトル改良版</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  background: linear-gradient(#aee1f9, #e0f7fa);
}

.container {
  max-width: 400px;
  margin: auto;
}

button {
  margin: 5px;
  padding: 10px;
  font-size: 16px;
  border-radius: 10px;
}

.box {
  border: 2px solid #333;
  padding: 10px;
  margin: 10px;
  background: white;
  border-radius: 15px;
}

.hp-bar {
  height: 20px;
  background: green;
  border-radius: 10px;
  transition: 0.3s;
}

img {
  width: 140px;
  border-radius: 20px;
  box-shadow: 2px 2px 10px gray;
  transition: transform 0.2s;
}

.hit {
  transform: translateX(10px);
}
</style>
</head>

<body>

<div class="container">
<h1>🐶わんバトル</h1>

<div id="select">
  <h2>犬を選んで！</h2>
  <button onclick="selectDog('chihuahua')">ちわわ</button>
  <button onclick="selectDog('pomeranian')">ポメラニアン</button>
  <button onclick="selectDog('poodle')">トイプードル</button>
</div>

<div id="battle" style="display:none;">

  <div class="box">
    <h3>相手の犬</h3>
    <img id="enemyImg">
    <div id="enemyHP"></div>
    <p id="enemyName"></p>
  </div>

  <div class="box">
    <h3>あなたの犬</h3>
    <img id="playerImg">
    <div id="playerHP"></div>
    <p id="playerName"></p>
  </div>

  <div>
    <button onclick="useSkill('bite')">かむ</button>
    <button onclick="useSkill('punch')">ぱんち</button>
    <button onclick="useSkill('bark')">吠える</button>
    <button onclick="useSkill('charm')">甘える</button>
  </div>

  <p id="log"></p>

</div>
</div>

<script>

let player, enemy;

// 🔊音
const soundAttack = new Audio("https://www.soundjay.com/buttons/sounds/button-09.mp3");
const soundWin = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");

function selectDog(type) {

  if(type === 'chihuahua') {
    player = {
      name:'ちわわ',
      hp:90,
      maxHp:90,
      speed:90,
      trust:60,
      img:'chihuahua.png'
    };
  }

  if(type === 'pomeranian') {
    player = {
      name:'ポメラニアン',
      hp:120,
      maxHp:120,
      speed:70,
      trust:70,
      img:'pomeranian.png'
    };
  }

  if(type === 'poodle') {
    player = {
      name:'トイプードル',
      hp:100,
      maxHp:100,
      speed:60,
      trust:90,
      img:'poodle.png'
    };
  }

  enemy = {
    name:'ライバル犬',
    hp:110,
    maxHp:110,
    speed:60,
    trust:60,
    img:'pomeranian.png'
  };

  document.getElementById("select").style.display="none";
  document.getElementById("battle").style.display="block";

  updateUI();
}

function updateUI() {

  document.getElementById("playerName").innerText = player.name + " HP:" + player.hp;
  document.getElementById("enemyName").innerText = enemy.name + " HP:" + enemy.hp;

  document.getElementById("playerHP").innerHTML =
    '<div class="hp-bar" style="width:'+(player.hp/player.maxHp*100)+'%"></div>';

  document.getElementById("enemyHP").innerHTML =
    '<div class="hp-bar" style="width:'+(enemy.hp/enemy.maxHp*100)+'%"></div>';

  document.getElementById("playerImg").src = player.img;
  document.getElementById("enemyImg").src = enemy.img;
}

function useSkill(skill) {

  let log = "";
  soundAttack.play();

  if(skill === 'bite') {
    if(Math.random() < 0.5){
      enemy.hp -= 15;
      log = "かむ成功！";
      shake("enemyImg");
    } else {
      log = "かむ失敗...";
    }
  }

  if(skill === 'punch') {
    if(Math.random() < 0.7){
      enemy.hp -= 20;
      player.hp -= 5;
      log = "ぱんちヒット！";
      shake("enemyImg");
    } else {
      log = "ぱんち外れ...";
    }
  }

  if(skill === 'bark') {
    enemy.speed -= 5;
    log = "相手のスピードダウン！";
  }

  if(skill === 'charm') {
    if(Math.random() < player.trust / 100){
      enemy.skip = true;
      log = "魅了成功！";
    } else {
      log = "甘える失敗...";
    }
  }

  if(enemy.hp <= 0){
    log = "勝ち！！🎉";
    soundWin.play();
    endGame();
  } else {
    enemyTurn(log);
  }

  updateUI();
}

function enemyTurn(prevLog) {

  let log = prevLog + "<br>";

  if(enemy.skip){
    log += "相手は動けない！";
    enemy.skip = false;
  } else {
    player.hp -= 10; // ←弱くした
    log += "相手の攻撃！";
    shake("playerImg");
  }

  if(player.hp <= 0){
    log += "<br>負け...";
    endGame();
  }

  document.getElementById("log").innerHTML = log;
}

function shake(id){
  let el = document.getElementById(id);
  el.classList.add("hit");
  setTimeout(()=>el.classList.remove("hit"),200);
}

function endGame(){
  document.querySelectorAll("button").forEach(b=>b.disabled=true);
}

</script>

</body>
</html>
